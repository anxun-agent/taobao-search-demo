<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>淘宝搜索 · 对话式需求收敛 Demo</title>
<style>
:root {
  --tb-orange:#FF5000; --tb-red:#FF2D4B; --tb-orange-bg:#FFF5F0;
  --bg:#F4F4F4; --bg-card:#FFFFFF; --text-1:#1A1A1A; --text-2:#666; --text-3:#999; --border:#EEE;
  --shadow:0 1px 8px rgba(0,0,0,0.05);
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --ai-purple:#7B61FF; --ai-purple-bg:#F3F0FF; --ai-gradient:linear-gradient(135deg,#7B61FF,#A78BFA);
  --pk-blue:#2563EB; --pk-blue-bg:#EFF6FF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
.phone{width:390px;height:844px;margin:10px auto;background:var(--bg);border-radius:40px;border:8px solid #1A1A1A;overflow:hidden;display:flex;flex-direction:column;position:relative}
@media(max-width:420px){.phone{width:100vw;height:100vh;margin:0;border:none;border-radius:0}}
.statusbar{height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;font-size:15px;font-weight:600}

/* Search Header */
.search-header{background:#fff;padding:6px 12px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:0.5px solid var(--border)}
.back-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sbar{flex:1;height:32px;background:#F5F5F5;border-radius:16px;display:flex;align-items:center;padding:0 10px;gap:6px}
.sbar input{flex:1;border:none;background:transparent;font-size:13px;outline:none;color:var(--text-1)}
.sbar input::placeholder{color:var(--text-3)}
.sbar .clear-x{width:16px;height:16px;background:#CCC;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sbar .clear-x.show{display:flex}
.search-go{background:var(--tb-orange);color:#fff;border:none;border-radius:16px;padding:0 12px;height:32px;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0}
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* Welcome */
.welcome{padding:30px 20px;text-align:center}
.welcome .w-icon{width:56px;height:56px;background:var(--ai-gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 16px rgba(123,97,255,0.3)}
.welcome h3{font-size:16px;font-weight:600;margin-bottom:6px}
.welcome p{font-size:12px;color:var(--text-3);line-height:1.5}
.hot-section{margin-top:20px;text-align:left}
.hot-label{font-size:11px;color:var(--text-3);margin-bottom:8px;font-weight:500}
.hot-chips{display:flex;flex-wrap:wrap;gap:8px}
.hot-chip{padding:8px 14px;background:#fff;border-radius:16px;font-size:12px;color:var(--text-2);cursor:pointer;box-shadow:var(--shadow);transition:all 0.15s;line-height:1.3}
.hot-chip:active{transform:scale(0.95);background:var(--ai-purple-bg);color:var(--ai-purple)}
.hot-chip.disabled{opacity:0.4;pointer-events:none;cursor:default}

/* ====== AI CARD (Keyword Mode) ====== */
.ai-card{margin:8px 8px 0;background:var(--bg-card);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;transition:all 0.3s;display:flex;flex-direction:column}
.ai-collapsed{display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer;flex-shrink:0}
.ai-collapsed:active{background:#FAFAFA}
.ai-collapsed .ai-icon{width:28px;height:28px;border-radius:50%;background:var(--ai-gradient);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-collapsed .ai-text{flex:1;font-size:13px;color:var(--text-2);line-height:1.4}
.ai-collapsed .ai-text strong{color:var(--ai-purple);font-weight:600}
.ai-collapsed .expand-arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform 0.3s;flex-shrink:0}
.ai-card.expanded .expand-arrow{transform:rotate(180deg)}
.ai-collapsed .ai-tag{font-size:10px;background:var(--ai-purple-bg);color:var(--ai-purple);padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}
.ai-expanded{max-height:0;overflow:hidden;transition:max-height 0.4s;display:flex;flex-direction:column}
.ai-card.expanded .ai-expanded{max-height:600px}
.conv-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px;max-height:360px}
.conv-scroll::-webkit-scrollbar{width:0}
.conv-sticky-input{display:none;padding:8px 14px 10px;border-top:1px solid var(--border);background:#fff;flex-shrink:0;flex-direction:column;gap:6px}
.ai-card.expanded .conv-sticky-input{display:flex}
.conv-sticky-input .conv-followups{display:flex;gap:4px;overflow-x:auto}
.conv-sticky-input .conv-followups::-webkit-scrollbar{display:none}
.conv-fchip{flex-shrink:0;padding:4px 10px;font-size:11px;border:1px solid #E8E8E8;border-radius:12px;color:var(--text-2);cursor:pointer;white-space:nowrap;background:#fff;transition:all 0.15s}
.conv-fchip:active{background:var(--ai-purple-bg);border-color:var(--ai-purple);color:var(--ai-purple)}
.conv-input-row{display:flex;gap:6px;align-items:center}
.conv-input{flex:1;height:32px;border:1px solid #E0E0E0;border-radius:16px;padding:0 12px;font-size:12px;outline:none;background:#FAFAFA}
.conv-input:focus{border-color:var(--ai-purple);background:#fff}
.conv-send{width:32px;height:32px;background:var(--ai-purple);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.conv-send:disabled{background:#CCC}
.conv-send:active{transform:scale(0.9)}
.conv-msg{margin-bottom:10px;animation:convFade 0.3s ease}
@keyframes convFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.conv-ai-row{display:flex;gap:8px;align-items:flex-start}
.conv-ai-avatar{width:24px;height:24px;border-radius:50%;background:var(--ai-gradient);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.conv-ai-bubble{font-size:13px;color:var(--text-1);line-height:1.5;flex:1}
.conv-user-row{display:flex;justify-content:flex-end;margin-bottom:10px}
.conv-user-bubble{background:var(--ai-purple);color:#fff;font-size:13px;padding:6px 12px;border-radius:14px 14px 4px 14px;max-width:70%}
.conv-q{margin-top:8px}
.conv-q-label{font-size:11px;color:var(--ai-purple);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.conv-chips{display:flex;flex-wrap:wrap;gap:6px}
.conv-chip{padding:6px 14px;border:1.5px solid #E8E8E8;border-radius:18px;font-size:12px;color:var(--text-1);cursor:pointer;background:#fff;transition:all 0.15s;line-height:1.3}
.conv-chip:active{transform:scale(0.95)}
.conv-chip.selected{border-color:var(--ai-purple);background:var(--ai-purple-bg);color:var(--ai-purple);font-weight:500}
.conv-chip .chip-sub{display:block;font-size:10px;color:var(--text-3);margin-top:1px}
.conv-chip.selected .chip-sub{color:var(--ai-purple);opacity:0.7}
.conv-needs{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 6px}
.conv-need-tag{font-size:11px;padding:3px 8px;background:var(--ai-purple-bg);color:var(--ai-purple);border-radius:10px;font-weight:500}
.conv-compare{margin:8px 0;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;font-size:11px}
.conv-compare-head{background:var(--ai-purple);color:#fff;padding:6px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.conv-compare-head .head-hint{font-weight:400;font-size:10px;opacity:0.8}
.conv-compare table{width:100%;border-collapse:collapse}
.conv-compare th{background:#FAFAFA;padding:8px 4px 6px;font-weight:600;text-align:center;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer;transition:all 0.2s;position:relative}
.conv-compare th:first-child{text-align:left;padding-left:8px;color:var(--text-3);font-weight:500;cursor:default}
.conv-compare th:not(:first-child):hover{background:#F0EDFF}
.conv-compare th.col-selected{background:var(--ai-purple-bg)!important;color:var(--ai-purple)}
.conv-compare th .th-select-hint{display:block;font-size:9px;font-weight:400;color:var(--text-3);margin-top:2px}
.conv-compare th.col-selected .th-select-hint{color:var(--ai-purple)}
.conv-compare th .th-check{display:none;width:16px;height:16px;background:var(--ai-purple);border-radius:50%;margin:4px auto 0;align-items:center;justify-content:center}
.conv-compare th.col-selected .th-check{display:flex}
.conv-compare th .rec-badge{display:inline-block;font-size:9px;background:var(--ai-purple);color:#fff;padding:1px 4px;border-radius:3px;margin-left:2px;vertical-align:middle}
.conv-compare td{padding:6px 4px;text-align:center;border-bottom:1px solid #F5F5F5;font-size:11px;line-height:1.3;transition:background 0.2s}
.conv-compare td:first-child{text-align:left;padding-left:8px;color:var(--text-3)}
.conv-compare td.col-selected{background:var(--ai-purple-bg)}
.conv-compare .cprice{color:var(--tb-red);font-weight:600}
.conv-table-action{padding:8px 0 0;display:flex;gap:8px}
.conv-btn{flex:1;padding:8px;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.conv-btn.primary{background:var(--ai-purple);color:#fff}
.conv-btn.primary:disabled{background:#CCC}
.conv-btn:active:not(:disabled){transform:scale(0.97)}
.ai-filter-notice{margin:0 8px;padding:6px 12px;background:var(--ai-purple-bg);border-radius:0 0 var(--r-md) var(--r-md);font-size:11px;color:var(--ai-purple);display:none;align-items:center;gap:4px;justify-content:space-between}
.ai-filter-notice.show{display:flex}
.ai-filter-notice .notice-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.ai-filter-notice .notice-tag{padding:1px 6px;background:#fff;border-radius:8px;font-size:10px}
.ai-filter-notice .clear-filter{font-size:11px;color:var(--ai-purple);cursor:pointer;text-decoration:underline;text-underline-offset:2px;flex-shrink:0}

/* ====== BROAD QUERY: AI Answer Card ====== */
.ai-answer-card{margin:8px;background:var(--bg-card);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;animation:convFade 0.4s ease}
.ai-answer-header{padding:12px 14px 0;display:flex;align-items:center;gap:8px}
.ai-answer-header .aa-icon{width:24px;height:24px;border-radius:50%;background:var(--ai-gradient);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-answer-header .aa-label{font-size:12px;color:var(--ai-purple);font-weight:600}
.ai-answer-body{padding:10px 14px;font-size:13px;line-height:1.7;color:var(--text-1);max-height:120px;overflow:hidden;position:relative;transition:max-height 0.4s}
.ai-answer-body.expanded-text{max-height:1000px}
.ai-answer-body .aa-fade{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#fff);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px}
.ai-answer-body.expanded-text .aa-fade{display:none}
.aa-expand-btn{font-size:12px;color:var(--ai-purple);cursor:pointer;font-weight:500;background:#fff;padding:0 8px}
.ai-answer-body b{color:var(--ai-purple)}
.ai-answer-body .aa-img-row{display:flex;gap:8px;margin:10px 0;overflow-x:auto}
.ai-answer-body .aa-img-row::-webkit-scrollbar{display:none}
.ai-answer-body .aa-img-item{flex-shrink:0;width:80px;border-radius:var(--r-sm);overflow:hidden;background:#F5F5F5;text-align:center}
.ai-answer-body .aa-img-item .aa-img-box{width:80px;height:64px;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
.ai-answer-body .aa-img-item .aa-img-box .aa-img-bg{position:absolute;inset:0;opacity:0.1}
.ai-answer-body .aa-img-item .aa-img-label{font-size:10px;padding:4px;color:var(--text-2);line-height:1.3}

/* Category Tabs */
.cat-tabs{display:flex;gap:0;padding:8px 14px 0;overflow-x:auto;border-top:1px solid var(--border)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:8px 14px;font-size:13px;color:var(--text-2);cursor:pointer;position:relative;white-space:nowrap;transition:all 0.2s;font-weight:500}
.cat-tab.active{color:var(--ai-purple)}
.cat-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2.5px;background:var(--ai-purple);border-radius:2px}

/* AI Attribute filters */
.attr-filters{padding:6px 12px 8px;display:flex;gap:6px;overflow-x:auto;margin:0 8px;background:#fff;border-radius:0 0 var(--r-md) var(--r-md);box-shadow:var(--shadow);position:sticky;top:40px;z-index:4}
.attr-filters::-webkit-scrollbar{display:none}
.attr-filters:empty{display:none}
.attr-chip{padding:5px 12px;border:1px solid #E8E8E8;border-radius:14px;font-size:11px;color:var(--text-2);cursor:pointer;background:#fff;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.attr-chip:active{transform:scale(0.95)}
.attr-chip.active{border-color:var(--ai-purple);background:var(--ai-purple-bg);color:var(--ai-purple);font-weight:500}
.attr-chip.ai-tag{border-color:var(--ai-purple);color:var(--ai-purple);border-style:dashed}

/* Related Questions - horizontal chips */
.related-qs-row{display:flex;gap:6px;padding:6px 14px 10px;overflow-x:auto;align-items:center}
.related-qs-row::-webkit-scrollbar{display:none}
.related-qs-row .rq-label{font-size:11px;color:var(--text-3);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:3px}
.related-qs-row .rq-chip{flex-shrink:0;padding:5px 10px;background:#F5F5F5;border-radius:14px;font-size:11px;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all 0.15s;border:1px solid transparent}
.related-qs-row .rq-chip:active{background:var(--ai-purple-bg);color:var(--ai-purple);border-color:var(--ai-purple)}

/* Clickable answer images */
.ai-answer-body .aa-img-item{cursor:pointer;transition:all 0.2s}
.ai-answer-body .aa-img-item:active{transform:scale(0.93);opacity:0.8}

/* ====== Product Cards ====== */
.product-feed{padding:8px 8px 80px}
.product-grid{column-count:2;column-gap:6px}
.pcard{break-inside:avoid;background:var(--bg-card);border-radius:var(--r-md);margin-bottom:6px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all 0.35s;position:relative}
.pcard:active{transform:scale(0.98)}
.pcard .pimg{width:100%;aspect-ratio:1;background:#F0F0F0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pcard .pimg-placeholder{font-size:40px;opacity:0.15}
.pcard .pimg-color{position:absolute;inset:0;opacity:0.08}
.pcard .match-badge{position:absolute;top:6px;left:6px;background:var(--ai-purple);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;display:none}
.pcard.matched .match-badge{display:block}
.pk-btn{position:absolute;top:6px;right:6px;z-index:5;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border:1.5px solid #E0E0E0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.pk-btn:active{transform:scale(0.85)}
.pk-btn.pk-selected{background:var(--pk-blue);border-color:var(--pk-blue)}
.pcard.pk-active{box-shadow:0 0 0 2px var(--pk-blue),var(--shadow)}
.pcard .pinfo{padding:8px 8px 10px}
.pcard .ptitle{font-size:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.pcard .ptitle .shop-icon{display:inline-block;background:var(--tb-red);color:#fff;font-size:9px;padding:0 3px;border-radius:2px;margin-right:3px;vertical-align:middle;font-weight:500}
.pcard .preason{font-size:10px;color:var(--ai-purple);background:var(--ai-purple-bg);padding:2px 6px;border-radius:4px;display:none;margin-bottom:4px;line-height:1.4}
.pcard.matched .preason{display:inline-block}
.pcard .pprice-row{display:flex;align-items:baseline;justify-content:space-between}
.pcard .pprice{color:var(--tb-red);font-size:16px;font-weight:700}
.pcard .pprice .yen{font-size:11px}
.pcard .psales{font-size:10px;color:var(--text-3)}
.pcard.reorder-in{animation:reorderIn 0.4s ease forwards}
@keyframes reorderIn{from{opacity:0;transform:translateY(10px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.product-grid.refreshing{opacity:0.4;transition:opacity 0.3s}
.product-grid.refreshed{opacity:1;transition:opacity 0.4s}

/* Filter bar */
.filter-bar{background:#fff;display:flex;align-items:center;padding:0 12px;height:40px;border-bottom:0.5px solid var(--border);margin:8px 8px 0;border-radius:var(--r-md) var(--r-md) 0 0;box-shadow:var(--shadow);position:sticky;top:0;z-index:5}
.filter-tab{flex:1;text-align:center;font-size:13px;color:var(--text-2);padding:8px 0;cursor:pointer;position:relative}
.filter-tab.active{color:var(--text-1);font-weight:600}
.filter-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--tb-orange);border-radius:1px}
.filter-tab .arrow{font-size:10px;margin-left:2px}

/* PK Bar */
.pk-bar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:8px 12px;z-index:50;display:none;align-items:center;gap:8px;box-shadow:0 -2px 12px rgba(0,0,0,0.08)}
.pk-bar.show{display:flex}
.pk-bar .pk-avatars{display:flex;flex:1;align-items:center}
.pk-avatar-item{width:40px;height:40px;border-radius:8px;background:#F0F0F0;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;margin-left:-6px;box-shadow:0 1px 4px rgba(0,0,0,0.1);overflow:hidden}
.pk-avatar-item:first-child{margin-left:0}
.pk-avatar-item .pk-av-color{position:absolute;inset:0;opacity:0.12}
.pk-avatar-item .pk-av-remove{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:#FF4D4F;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.pk-slot-empty{width:40px;height:40px;border-radius:8px;border:1.5px dashed #CCC;margin-left:-6px;display:flex;align-items:center;justify-content:center;color:#CCC;font-size:16px}
.pk-slot-empty:first-child{margin-left:0}
.pk-bar .pk-go-btn{padding:10px 20px;background:var(--pk-blue);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px}
.pk-bar .pk-go-btn:disabled{background:#CCC}
.pk-bar .pk-go-btn:active{transform:scale(0.95)}
.pk-bar .pk-count{background:#fff;color:var(--pk-blue);font-size:11px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

/* PK Panel */
.pk-overlay{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,0.5);display:none;align-items:flex-end}
.pk-overlay.show{display:flex}
.pk-panel{background:#fff;width:100%;border-radius:20px 20px 0 0;max-height:85%;overflow:hidden;display:flex;flex-direction:column;animation:panelSlideUp 0.35s ease}
@keyframes panelSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pk-panel-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.pk-panel-header .pk-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.pk-panel-header .pk-title .pk-icon{background:var(--pk-blue);color:#fff;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.pk-panel-close{width:28px;height:28px;border-radius:50%;background:#F0F0F0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pk-panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 16px}
.pk-products-row{display:flex;padding:12px 16px;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}
.pk-product-head{flex:1;min-width:0;text-align:center}
.pk-product-head .pk-ph-img{width:64px;height:64px;border-radius:10px;background:#F5F5F5;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden}
.pk-product-head .pk-ph-img .pk-ph-color{position:absolute;inset:0;opacity:0.1}

  broadActiveTab = key; broadActiveAttr = null; broadActiveSubItem = null;

  tabEl.classList.add('active');
  updateAttrFilters();
  renderBroadProducts(true);
}

function selectSubItem(imgIdx) {
  const im = GIFT_DATA.images[imgIdx];
  if (!im) return;
  broadActiveSubItem = im;
  broadActiveTab = im.tab;
  broadActiveAttr = null;
  const tabs = document.querySelectorAll('.cat-tab');
  tabs.forEach(t => {
    const tabData = GIFT_DATA.tabs.find(tb => tb.name === t.textContent);
    t.classList.toggle('active', tabData && tabData.key === im.tab);
  });
  updateAttrFilters();
  renderBroadProducts(true);
  const filterEl = document.getElementById('attrFilters');
  if (filterEl) filterEl.scrollIntoView({behavior:'smooth',block:'nearest'});

function jumpToTab(tabKey) {
  const tabs = document.querySelectorAll('.cat-tab');
  for (const t of tabs) {
    if (t.textContent === GIFT_DATA.tabs.find(tb => tb.key === tabKey)?.name) {
      switchTab(tabKey, t);
      t.scrollIntoView({behavior:'smooth',inline:'center'});
      break;
    }
  }
}

function updateAttrFilters() {
  const el = document.getElementById('attrFilters');
  if (broadActiveSubItem) {
    const subLabel = `<div class="attr-chip active" onclick="clearSubItem()" style="border-color:var(--ai-purple);background:var(--ai-purple-bg);color:var(--ai-purple)">${broadActiveSubItem.label} ✕</div>`;
    const subAttrs = broadActiveSubItem.subAttrs.map(a => `<div class="attr-chip ${broadActiveAttr===a?'active':''}" onclick="toggleAttr('${a}')">${a}</div>`).join('');
    el.innerHTML = subLabel + subAttrs;
    return;
  }
  const tab = GIFT_DATA.tabs.find(t => t.key === broadActiveTab);
  if (!tab || !tab.attrs || !tab.attrs.length) { el.innerHTML = ''; return; }
  el.innerHTML = tab.attrs.map(a => `<div class="attr-chip ${broadActiveAttr===a?'active':''}" onclick="toggleAttr('${a}')">${a}</div>`).join('');
}

function clearSubItem() {
  broadActiveSubItem = null; broadActiveAttr = null;
  updateAttrFilters();
  renderBroadProducts(true);
}

function toggleAttr(attr) {
  broadActiveAttr = broadActiveAttr === attr ? null : attr;
  updateAttrFilters();
  renderBroadProducts(true);
}

    {key:'similar',label:'搜相似款',resp:'已切换为相似款模式，会搜索同类型不同品牌'},
    {key:'color',label:'换个颜色',resp:'已将颜色调整为黑色系，图片已更新 👆'},
    {key:'nologo',label:'去掉Logo',resp:'已去除品牌Logo，按纯外观搜索相似款'},
  ];
  body.innerHTML = `
    <div class="is-preview">
      <div class="is-img"><div class="is-img-bg" style="background:${imgEdits.includes('color')?'#1A1A1A':'#F97316'}"></div>👟
        ${imgEdits.length?`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(123,97,255,0.85);color:#fff;font-size:9px;text-align:center;padding:2px">AI已编辑</div>`:''}
      </div>
      <div class="is-img-info">
        <div class="is-img-label">运动鞋 · ${imgEdits.includes('color')?'黑色':'橙色'}</div>
        <div class="is-img-sub">AI识别置信度 96%</div>
        ${imgEdits.length?`<div class="is-edit-tags">${imgEdits.map(e => {const c=editChips.find(x=>x.key===e);return`<span class="is-edit-tag">✓ ${c?c.label:e}</span>`;}).join('')}</div>`:''}
      </div>
    </div>
    <div class="is-conv-area" id="isConvArea">
      ${isConvMessages.map(m => m.role==='ai'?`
        <div class="is-conv-msg"><div class="is-avatar"><svg width="10" height="10" viewBox="0 0 24 24" fill="#fff"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div><div class="is-bubble">${m.text}</div></div>
      `:`<div class="is-conv-msg user-msg"><div class="is-user-bubble">${m.text}</div></div>`).join('')}
    </div>
    <div class="is-edit-chips">
      ${editChips.map(c => `<div class="is-edit-chip ${imgEdits.includes(c.key)?'applied':''}" onclick="applyImageEdit('${c.key}','${c.label}','${c.resp}')">${c.label}</div>`).join('')}
    </div>
    <div class="is-input-row">
      <input class="is-input" id="isInput" placeholder="描述你想修改的内容…" onkeydown="if(event.key==='Enter'){sendImageEditInput();event.preventDefault()}" oninput="document.getElementById('isSendBtn').disabled=!this.value.trim()"/>
      <button class="is-send" id="isSendBtn" disabled onclick="sendImageEditInput()"><svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
    <button class="is-go-btn" onclick="startImageSearch()">开始图搜 →</button>
  `;
}

function applyImageEdit(key, label, resp) {
  if (!imgEdits.includes(key)) imgEdits.push(key);
  isConvMessages.push({role:'user',text:label});
  isConvMessages.push({role:'ai',text:resp});
  renderImageEditPhase();
  const conv = document.getElementById('isConvArea');
  if (conv) conv.scrollTop = conv.scrollHeight;
}

function sendImageEditInput() {
  const input = document.getElementById('isInput');
  const text = input.value.trim();
  if (!text) return;
  isConvMessages.push({role:'user',text});
  isConvMessages.push({role:'ai',text:`收到「${text}」，已应用到图片，可以开始搜索了 👇`});
  imgEdits.push('custom');
  renderImageEditPhase();
}

function startImageSearch() {
  closeImageSearch();
  document.getElementById('searchInput').value = '图搜：运动鞋';
  document.getElementById('clearX').classList.add('show');
  showKeywordMode('图搜：运动鞋');
}

// ==================== LIST MODE (囤货清单) ====================
function showListMode(q) {
  currentMode = 'list'; listPhase = 'edit'; listBudget = null;
  listChecked = {}; listSelections = {};
  BABY_LIST_DATA.categories.forEach(c => {
    listChecked[c.key] = true;
    listSelections[c.key] = c.products.find(p => p.selected)?.id || c.products[0].id;
  });
  const d = BABY_LIST_DATA;
  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div class="ai-answer-card">
      <div class="ai-answer-header">
        <div class="aa-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
        <span class="aa-label">已为你生成囤货清单</span>
      </div>
      <div class="ai-answer-body" id="aaBody">
        <div>${d.answer}</div>
        <div class="aa-fade"><span class="aa-expand-btn" onclick="toggleAnswerExpand()">展开 ▾</span></div>
      </div>
      <div class="list-checklist" id="listChecklist">
        ${d.categories.map(c => `
          <div class="list-item ${listChecked[c.key]?'':'unchecked'}" id="li-${c.key}" onclick="toggleListItem('${c.key}')">
            <div class="li-check ${listChecked[c.key]?'checked':''}"><svg width="10" height="10" viewBox="0 0 24 24" fill="#fff" style="display:${listChecked[c.key]?'block':'none'}"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
            <span class="li-emoji">${c.emoji}</span>
            <div class="li-info"><div class="li-name">${c.name}</div><div class="li-desc">${c.desc}</div></div>
          </div>
        `).join('')}
      </div>
      <div class="list-budget" id="listBudgetArea">
        <div class="lb-label">总预算</div>
        <div class="lb-chips">
          ${['500以内','500-1000','1000-2000','不限'].map(b => `<div class="lb-chip ${b==='不限'?'active':''}" onclick="selectBudget('${b}',this)">${b}</div>`).join('')}
        </div>
      </div>
      <div class="list-go">
        <button class="list-go-btn" id="listGoBtn" onclick="startListSearch()">开始清单搜索 <span class="lg-count" id="lgCount">${Object.values(listChecked).filter(v=>v).length}项</span></button>
      </div>
    </div>
    <div id="listShopArea"></div>
  `;
  listBudget = '不限';
  document.getElementById('listCartBar').classList.remove('show');
}

function toggleListItem(key) {
  if (listPhase !== 'edit') return;
  listChecked[key] = !listChecked[key];
  const el = document.getElementById(`li-${key}`);
  if (el) {
    el.classList.toggle('unchecked', !listChecked[key]);
    const chk = el.querySelector('.li-check');
    chk.classList.toggle('checked', listChecked[key]);
    chk.querySelector('svg').style.display = listChecked[key] ? 'block' : 'none';
  }
  const cnt = Object.values(listChecked).filter(v=>v).length;
  const lgc = document.getElementById('lgCount');
  if (lgc) lgc.textContent = cnt + '项';
  const btn = document.getElementById('listGoBtn');
  if (btn) btn.disabled = cnt === 0;
}

function selectBudget(b, el) {
  listBudget = b;
  document.querySelectorAll('.lb-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function startListSearch() {
  listPhase = 'shop';
  const checklist = document.getElementById('listChecklist');
  if (checklist) { checklist.querySelectorAll('.list-item').forEach(el => el.style.pointerEvents = 'none'); }
  const budgetArea = document.getElementById('listBudgetArea');
  if (budgetArea) budgetArea.style.display = 'none';
  const goBtn = document.getElementById('listGoBtn');
  if (goBtn) goBtn.style.display = 'none';
  renderListShopping();
  document.getElementById('listCartBar').classList.add('show');
  document.getElementById('pkBar').classList.remove('show');
  updateCartBar();
}

function renderListShopping() {
  const area = document.getElementById('listShopArea');
  if (!area) return;
  const cats = BABY_LIST_DATA.categories.filter(c => listChecked[c.key]);
  area.innerHTML = cats.map((c, ci) => `
    <div class="list-section" style="animation-delay:${ci*0.08}s">
      <div class="list-section-header">
        <span class="ls-emoji">${c.emoji}</span>
        <span class="ls-name">${c.name}</span>
        <span class="ls-count">为你精选 ${c.products.length} 款</span>
      </div>
      <div class="list-product-scroll">
        ${c.products.map(p => `
          <div class="list-pcard ${listSelections[c.key]===p.id?'selected':''}" onclick="selectListProduct('${c.key}',${p.id})">
            <div class="lp-select">${listSelections[c.key]===p.id?'<svg width="10" height="10" viewBox="0 0 24 24" fill="#fff"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>':''}</div>
            <div class="lp-img"><div class="lp-color" style="background:${p.color}"></div>${p.img}</div>
            <div class="lp-info">
              <div class="lp-title">${p.title}</div>
              <div class="lp-reason">${p.reason}</div>
              <div class="lp-price-row"><span class="lp-price"><span class="yen">¥</span>${p.price}</span>${p.promo?`<span class="lp-promo">${p.promo}</span>`:''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectListProduct(catKey, productId) {
  listSelections[catKey] = productId;
  renderListShopping();
  updateCartBar();
}

function updateCartBar() {
  let total = 0, count = 0;
  BABY_LIST_DATA.categories.forEach(c => {
    if (!listChecked[c.key]) return;
    const sel = c.products.find(p => p.id === listSelections[c.key]);
    if (sel) { total += sel.price; count++; }
  });
  document.getElementById('lcItemCount').textContent = count;
  document.getElementById('lcTotal').textContent = total;
}

function addAllToCart() {
  let count = 0, total = 0;
  BABY_LIST_DATA.categories.forEach(c => {
    if (!listChecked[c.key]) return;
    const sel = c.products.find(p => p.id === listSelections[c.key]);
    if (sel) { total += sel.price; count++; }
  });
  showToast(`已加入购物车 ${count} 件 · ¥${total}`);
}

// ==================== PK ====================
function togglePk(id){if(pkSet.has(id))pkSet.delete(id);else{if(pkSet.size>=4){showToast('最多选4款对比');return;}pkSet.add(id);}updatePkUI();if(currentMode==='keyword'){kwFilter();}else if(currentMode==='broad'){renderBroadProducts();}}
function updatePkUI(){const bar=document.getElementById('pkBar'),av=document.getElementById('pkAvatars'),cnt=document.getElementById('pkCount'),btn=document.getElementById('pkGoBtn');const c=pkSet.size;if(!c){bar.classList.remove('show');return;}bar.classList.add('show');const all=[...SHOE_PRODUCTS,...GIFT_DATA.products];const items=[...pkSet].map(id=>all.find(p=>p.id===id)).filter(Boolean);let h=items.map(p=>`<div class="pk-avatar-item"><div class="pk-av-color" style="background:${p.color}"></div>${p.img}<div class="pk-av-remove" onclick="event.stopPropagation();togglePk(${p.id})"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" width="8" height="8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div></div>`).join('');for(let i=c;i<4;i++)h+=`<div class="pk-slot-empty">+</div>`;av.innerHTML=h;cnt.textContent=c;btn.disabled=c<2;}
function openPkPanel(){if(pkSet.size<2)return;const all=[...SHOE_PRODUCTS,...GIFT_DATA.products];const items=[...pkSet].map(id=>all.find(p=>p.id===id)).filter(Boolean);const prices=items.map(p=>p.price),minP=Math.min(...prices);const cheapest=items.find(p=>p.price===minP);let ai=`<b>${cheapest.title.split(' ').slice(0,3).join(' ')}</b> 性价比最高`;if(items[0].promo)ai+=`，当前 ${items[0].promo}`;
  const specKeys=items[0].specs?[{k:'cushion',l:'缓震'},{k:'weight',l:'重量'},{k:'scene',l:'场景'}]:[];
  const panel=document.getElementById('pkPanel');
  panel.innerHTML=`<div class="pk-panel-header"><div class="pk-title"><div class="pk-icon">PK</div>商品对比</div><button class="pk-panel-close" onclick="closePkPanel()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="pk-panel-body"><div class="pk-products-row">${items.map(p=>`<div class="pk-product-head"><div class="pk-ph-img"><div class="pk-ph-color" style="background:${p.color}"></div>${p.img}</div><div class="pk-ph-name">${p.title.substring(0,20)}</div><div class="pk-ph-price"><span class="yen">¥</span>${p.price}</div></div>`).join('')}</div>
  <div class="pk-ai-summary"><div class="pk-ai-label">✨ AI 选购建议</div><div class="pk-ai-text">${ai}</div></div>
  <div class="pk-spec-section"><div class="pk-spec-title">价格 & 优惠</div>
    <div class="pk-spec-row"><div class="pk-spec-label">当前价</div><div class="pk-spec-values">${items.map(p=>`<div class="pk-spec-val ${p.price===minP?'best':''}" style="color:var(--tb-red);font-weight:700">¥${p.price}${p.price===minP?' 💰':''}</div>`).join('')}</div></div>
    <div class="pk-spec-row"><div class="pk-spec-label">优惠</div><div class="pk-spec-values">${items.map(p=>`<div class="pk-spec-val"><span class="promo-tag">${p.promo||'暂无'}</span></div>`).join('')}</div></div>
    <div class="pk-spec-row"><div class="pk-spec-label">销量</div><div class="pk-spec-values">${items.map(p=>`<div class="pk-spec-val">${p.sales}</div>`).join('')}</div></div>
  </div>
  ${specKeys.length?`<div class="pk-spec-section"><div class="pk-spec-title">核心参数</div>${specKeys.map(s=>`<div class="pk-spec-row"><div class="pk-spec-label">${s.l}</div><div class="pk-spec-values">${items.map(p=>`<div class="pk-spec-val">${p.specs?p.specs[s.k]||'-':'-'}</div>`).join('')}</div></div>`).join('')}</div>`:''}
  </div>
  <div class="pk-panel-footer">${items.map(p=>`<button class="pk-buy-btn" onclick="closePkPanel();showToast('已加入购物车：¥${p.price}')"><span>¥${p.price} 购买</span><span class="btn-sub">${p.brand||p.shop}</span></button>`).join('')}</div>`;
  document.getElementById('pkOverlay').classList.add('show');
}
function closePkPanel(){document.getElementById('pkOverlay').classList.remove('show');}
function showToast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1500);}
</script>
</body>
</html>
